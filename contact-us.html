<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact-us.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="class-logo.png" alt="Logo" class="logo">
            <div class="logo-name">TMKM Class 9(B)</div>
        </div>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="class-routine.html">Class Routine</a></li>
                <li><a href="all-subjects.html">All Subjects</a></li>
                <li><a href="special-announcements.html">Special Announcements</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-us-section">
            <h1>Contact Us</h1>
            <div class="contact-form-container">
                <p>We value your feedback! Please rate us and provide your feedback by contacting us through the form below.</p>
                <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="489289d6-e346-4bd2-941e-c861df0145e9">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="roll">Roll</label>
                        <input type="text" id="roll" name="roll" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
                    </div>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Tamirul Millat Kamil Madrasah. All rights reserved.</p>
    </footer>

    <script>
        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('active');
        }
    </script>
</body>
</html>
